<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 발표자 추출기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="confetti-container"></div>
  
  <div class="container">
    <h1>🎉 랜덤 발표자 추출기 🎉</h1>
    
    <!-- Slot Machine Area -->
    <div class="slot-machine-container">
      <div class="slot-display" id="slotDisplay">
        <!-- Slots will be injected here by JS -->
      </div>
      
      <div class="controls">
        <label for="extractCount">추출 인원:</label>
        <select id="extractCount">
          <option value="1">1명</option>
          <option value="2">2명</option>
          <option value="3">3명</option>
          <option value="4">4명</option>
          <option value="5">5명</option>
        </select>
        <button class="btn-primary" id="btnExtract">뽑기!</button>
      </div>
    </div>

    <!-- Student Manager -->
    <div class="student-manager">
      <h3>👨‍🎓 학생 명단 관리</h3>
      <div class="input-group">
        <input type="text" id="studentInput" placeholder="이름 입력 (쉼표로 구분하여 여러명 추가 가능)" autocomplete="off">
        <button class="btn-secondary" id="btnAddStudent">추가</button>
      </div>
      <div class="student-list" id="studentList">
        <!-- Student tags will be injected here -->
      </div>
      <div class="file-controls">
        <span>총 인원: <span id="totalCount">0</span>명</span>
        <div class="buttons">
          <button class="btn-secondary" id="btnDownload">명단 저장 (.txt)</button>
          <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">명단 불러오기</button>
          <input type="file" id="fileInput" accept=".txt,.csv" style="display: none;">
          <button class="btn-secondary" id="btnClearAll" style="background-color: #ff7675; box-shadow: 0 4px 0 #d63031;">초기화</button>
        </div>
      </div>
    </div>

    <!-- Secret Trigger -->
    <div class="secret-trigger" id="secretTrigger"></div>
  </div>

  <!-- Secret Modal -->
  <div class="modal" id="secretModal">
    <div class="modal-content">
      <h2>🤫 선생님 비밀 메뉴</h2>
      <p>미리 나올 학생 이름 순서를 적어주세요. (줄바꿈 또는 쉼표로 구분)</p>
      <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">여기에 적힌 이름이 먼저 무조건 뽑힙니다.</p>
      <textarea id="secretInput" placeholder="예: 김철수, 이영희, 박민수"></textarea>
      <div class="buttons">
        <button class="btn-secondary" id="btnSecretCancel">취소</button>
        <button class="btn-primary" id="btnSecretSave" style="padding: 10px 20px; font-size: 1.2rem;">저장</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
