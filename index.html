<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 발표자 추출기</title>
  <!-- Material Symbols Outline -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="confetti-container"></div>
  
  <!-- App Bar -->
  <header class="top-app-bar">
    <div class="title">
      <span class="material-symbols-outlined">casino</span>
      랜덤 발표자 추출기
    </div>
  </header>

  <main class="main-container">
    
    <!-- Extraction Area -->
    <section class="md-card-elevated">
      <h2><span class="material-symbols-outlined">group_add</span>발표자 뽑기</h2>
      
      <div class="controls-row">
        <div class="md-text-field" style="flex: 0 0 auto;">
          <select id="extractCount" class="md-select">
            <option value="1">1명 추출</option>
            <option value="2">2명 추출</option>
            <option value="3">3명 추출</option>
            <option value="4">4명 추출</option>
            <option value="5">5명 추출</option>
          </select>
        </div>
        <button class="md-btn md-btn-filled" id="btnExtract">
          <span class="material-symbols-outlined">play_arrow</span>
          시작하기
        </button>
      </div>

      <div class="slot-display" id="slotDisplay">
        <!-- Slots injected by JS -->
      </div>
    </section>

    <!-- Student Manager Area -->
    <section class="md-card">
      <h2><span class="material-symbols-outlined">manage_accounts</span>학생 명단 관리</h2>
      
      <div class="controls-row">
        <div class="md-text-field">
          <input type="text" id="studentInput" class="md-input" placeholder="이름 입력 (쉼표로 구분 가능)" autocomplete="off">
        </div>
        <button class="md-btn md-btn-tonal" id="btnAddStudent">
          <span class="material-symbols-outlined">add</span>
          추가
        </button>
      </div>
      
      <div class="student-list" id="studentList">
        <!-- Student chips injected by JS -->
      </div>
      
      <div class="status-text">
        현재 등록된 학생 수: <strong id="totalCount">0</strong>명
      </div>

      <div class="controls-row" style="margin-top: 8px;">
        <button class="md-btn md-btn-outlined" id="btnDownload">
          <span class="material-symbols-outlined">download</span>
          명단 저장
        </button>
        <button class="md-btn md-btn-outlined" onclick="document.getElementById('fileInput').click()">
          <span class="material-symbols-outlined">upload</span>
          명단 불러오기
        </button>
        <input type="file" id="fileInput" accept=".txt,.csv" style="display: none;">
        <div style="flex: 1;"></div>
        <button class="md-btn md-btn-error" id="btnClearAll">
          <span class="material-symbols-outlined">delete_sweep</span>
          전체 초기화
        </button>
      </div>
    </section>

  </main>

  <div class="secret-trigger" id="secretTrigger"></div>

  <!-- Secret Modal -->
  <div class="modal" id="secretModal">
    <div class="modal-dialog">
      <h3>비밀 설정</h3>
      <p>미리 뽑힐 학생 이름을 적어주세요. (줄바꿈/쉼표 구분)</p>
      <textarea id="secretInput" placeholder="예: 김철수, 이영희"></textarea>
      <div class="modal-actions">
        <button class="md-btn md-btn-error" id="btnSecretCancel">취소</button>
        <button class="md-btn md-btn-filled" id="btnSecretSave">저장</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
